services:
  # Source PostgreSQL database
  postgres-source:
    image: postgres:17
    container_name: etl-postgres-source
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_source_data:/var/lib/postgresql/data
      - ./data/table_definitions.sql:/docker-entrypoint-initdb.d/01-table_definitions.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - etl-network

  # Target PostgreSQL database
  postgres-target:
    image: postgres:17
    container_name: etl-postgres-target
    environment:
      POSTGRES_DB: target
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_target_data:/var/lib/postgresql/data
      - ./data/table_definitions.sql:/docker-entrypoint-initdb.d/01-table_definitions.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - etl-network

volumes:
  postgres_source_data:
  postgres_target_data:

networks:
  etl-network:
    driver: bridge
